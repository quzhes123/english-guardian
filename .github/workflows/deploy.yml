name: Deploy Mini Program

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Inject Aliyun OCR credentials
        run: |
          sed -i 's/\${ALIYUN_ACCESS_KEY_ID}/${{ secrets.ALIYUN_ACCESS_KEY_ID }}/g' pages/word-list/word-list.js
          sed -i 's/\${ALIYUN_ACCESS_KEY_SECRET}/${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}/g' pages/word-list/word-list.js

      - name: Upload to WeChat
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_PRIVATE_KEY: ${{ secrets.WX_PRIVATE_KEY }}
        run: node scripts/upload.js
